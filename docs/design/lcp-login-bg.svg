<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f4f4f5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Large abstract shape 1 — top-right sweeping form -->
  <path d="M 1200 0 Q 1500 80, 1700 300 Q 1920 540, 1920 0 Z"
        fill="#e4e4e7"/>

  <!-- Large abstract shape 2 — bottom-right curve -->
  <path d="M 1920 1080 Q 1600 900, 1400 1080 Z"
        fill="#d4d4d8"/>

  <!-- Large abstract shape 3 — bottom-left subtle form -->
  <path d="M 0 1080 L 0 860 Q 300 800, 500 1080 Z"
        fill="#e4e4e7" opacity="0.6"/>

  <!-- Accent circle — right center, large and confident -->
  <circle cx="1580" cy="450" r="180"
          fill="none" stroke="#d4d4d8" stroke-width="2"/>

  <!-- Single thin line accent -->
  <line x1="1100" y1="0" x2="1400" y2="1080"
        stroke="#e4e4e7" stroke-width="1"/>
</svg>
