openapi: 3.0.3
info:
  title: LCP API
  description: LCP Platform API
  version: v1
tags:
  - name: AuditLog
    description: 审计日志：记录 API 写操作和认证事件
  - name: Overview
    description: 概览统计
  - name: User
    description: 用户管理：平台用户的增删改查，支持密码设置与修改。用户可被添加为租户或项目的成员。
  - name: Workspace
    description: 租户管理：租户是平台的顶层租户/组织单元，包含多个项目（Namespace）和成员。创建租户时会自动创建默认项目并将创建者设为所有者。
  - name: Namespace
    description: 项目管理：项目（Namespace）是租户下的子单元，用于组织团队和资源。项目归属于某个租户，拥有独立的成员列表。添加项目成员时会自动将其加入父租户。
  - name: Permission
    description: 权限管理：权限由路由自动注册，表示一个 API 操作（如 iam:users:list）。
  - name: Role
    description: 角色管理：角色定义了一组权限规则，可绑定到用户。支持内置角色和自定义角色。
  - name: RoleBinding
    description: 角色绑定：将用户与角色在特定作用域（平台/租户/项目）下关联。
  - name: OIDC
  - name: Host
    description: 主机管理：物理机或虚拟机资源，支持三层创建（平台/租户/项目）和向下分配。
  - name: Environment
    description: 环境管理：按生命周期阶段（开发、测试、生产等）分组资源的管理维度。
  - name: HostAssignment
    description: 主机分配记录：表示上层主机被授权给下层使用。
paths:
  /.well-known/jwks.json:
    get:
      summary: JSON Web Key Set
      description: 返回用于验证 JWT 签名的 ECDSA 公钥集
