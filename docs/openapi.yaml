  /oidc/authorize:
    get:
      summary: 授权端点
      description: 发起 OAuth2 Authorization Code Flow，验证参数后重定向到登录页面
      operationId: oidcAuthorize
      tags:
        - OIDC
      responses:
        "302":
          description: 重定向到登录页面
  /oidc/login:
    post:
      summary: 用户登录
      description: 验证用户名和密码，完成授权流程或直接登录
      operationId: oidcLogin
      tags:
        - OIDC
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OIDCLoginRequest'
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OIDCLoginResponse'
        "401":
          description: 认证失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OIDCErrorResponse'
  /oidc/token:
    post:
      summary: 令牌端点
      description: 用授权码或刷新令牌换取访问令牌
      operationId: oidcToken
      tags:
        - OIDC
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OIDCTokenRequest'
      responses:
        "200":
          description: 令牌签发成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OIDCTokenResponse'
        "400":
          description: 请求无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OIDCErrorResponse'
  /oidc/userinfo:
    get:
      summary: 用户信息端点
      description: 通过 Bearer Token 获取当前认证用户的信息
      operationId: getOIDCUserInfo
      tags:
        - OIDC
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OIDCUserInfoResponse'
        "401":
          description: 令牌无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OIDCErrorResponse'
    post:
      summary: 用户信息端点（POST）
      description: 通过 Bearer Token 获取当前认证用户的信息（POST 方法）
      operationId: postOIDCUserInfo
      tags:
        - OIDC
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OIDCUserInfoResponse'
        "401":
          description: 令牌无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OIDCErrorResponse'
components:
  schemas:
    AuditLog:
      type: object
      properties:
        spec:
          $ref: '#/components/schemas/AuditLogSpec'
    AuditLogList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AuditLog'
        totalCount:
          type: integer
          format: int64
    AuditLogSpec:
      type: object
      properties:
        action:
          type: string
          description: 操作动作
        clientIp:
          type: string
          description: 客户端 IP
        createdAt:
          type: string
          description: 创建时间
        detail:
          $ref: '#/components/schemas/RawMessage'
          description: 请求体（JSON）
        durationMs:
          type: integer
          format: int
          description: 请求耗时（毫秒）
        eventType:
          type: string
          description: 事件类型：api_operation 或 authentication
          enum:
            - api_operation
            - authentication
        httpMethod:
          type: string
          description: HTTP 方法
        httpPath:
          type: string
          description: HTTP 路径
        id:
          type: string
          description: 日志 ID
        module:
          type: string
          description: 所属模块
        namespaceId:
          type: string
          description: 项目 ID
        resourceId:
          type: string
          description: 资源 ID
        resourceType:
          type: string
          description: 资源类型
        scope:
          type: string
          description: 作用域
          enum:
            - platform
            - workspace
            - namespace
        statusCode:
          type: integer
          format: int
          description: HTTP 状态码
        success:
          type: boolean
          description: 是否成功
        userAgent:
          type: string
          description: User-Agent
        userId:
          type: string
          description: 操作用户 ID
        username:
          type: string
          description: 操作用户名
        workspaceId:
          type: string
          description: 租户 ID
    Environment:
      type: object
      properties:
        spec:
          $ref: '#/components/schemas/EnvironmentSpec'
    EnvironmentList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Environment'
        totalCount:
          type: integer
          format: int64
    EnvironmentSpec:
      type: object
      properties:
        description:
          type: string
          description: 环境描述
        displayName:
          type: string
          description: 环境显示名称
        envType:
          type: string
          description: 环境类型
          enum:
            - development
            - testing
            - staging
            - production
            - custom
        hostCount:
          type: integer
          format: int64
          description: 关联主机数量（只读）
        namespaceId:
          type: string
          description: 所属项目 ID（namespace scope 时必填）
        scope:
          type: string
          description: 创建层级
          enum:
            - platform
            - workspace
            - namespace
        status:
          type: string
          description: 环境状态
          enum:
            - active
            - inactive
        workspaceId:
          type: string
          description: 所属租户 ID（workspace scope 时必填）
      required:
        - scope
    Host:
      type: object
      properties:
        spec:
          $ref: '#/components/schemas/HostSpec'
    HostAssignment:
      type: object
      properties:
        spec:
          $ref: '#/components/schemas/HostAssignmentSpec'
    HostAssignmentList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/HostAssignment'
    HostAssignmentSpec:
      type: object
      properties:
        hostId:
          type: string
          description: 被分配的主机 ID
        hostName:
          type: string
          description: 主机名称（只读）
        namespaceId:
          type: string
          description: 目标项目 ID
        namespaceName:
          type: string
          description: 目标项目名称（只读）
        workspaceId:
          type: string
          description: 目标租户 ID
        workspaceName:
          type: string
          description: 目标租户名称（只读）
      required:
        - hostId
    HostList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Host'
        totalCount:
          type: integer
          format: int64
    HostSpec:
      type: object
      properties:
        arch:
          type: string
          description: CPU 架构
        cpuCores:
          type: integer
          format: int32
          description: CPU 核心数
        diskGb:
          type: integer
          format: int64
          description: 磁盘大小（GB）
        environmentId:
          type: string
          description: 绑定的环境 ID（只读）
        environmentName:
          type: string
          description: 绑定的环境名称（只读）
        hostname:
          type: string
          description: 主机名称（hostname）
        ipAddress:
          type: string
          description: IP 地址
        labels:
          type: object
          description: 标签
        memoryMb:
          type: integer
          format: int64
          description: 内存大小（MB）
        namespaceId:
          type: string
          description: 所属项目 ID（namespace scope 时必填）
        origin:
          type: string
          description: 主机来源：owned 表示自有，assigned 表示被分配（只读，仅 workspace/namespace 列表返回）
          enum:
            - owned
            - assigned
        os:
          type: string
          description: 操作系统
        scope:
          type: string
          description: 创建层级
          enum:
            - platform
            - workspace
            - namespace
        status:
          type: string
          description: 主机状态
          enum:
            - active
            - inactive
        workspaceId:
          type: string
          description: 所属租户 ID（workspace scope 时必填）
      required:
        - scope
    Namespace:
      type: object
      properties:
        spec:
          $ref: '#/components/schemas/NamespaceSpec'
    NamespaceList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Namespace'
        totalCount:
          type: integer
          format: int64
    NamespaceScopePerms:
      type: object
      properties:
        permissions:
          type: array
          description: 展开后的权限码列表
          items:
            type: string
        roleNames:
          type: array
          description: 角色名称列表
          items:
            type: string
        workspaceId:
          type: string
          description: 所属租户 ID
    NamespaceSpec:
      type: object
      properties:
        description:
          type: string
          description: 项目描述
        displayName:
          type: string
          description: 项目显示名称
        joinedAt:
          type: string
          description: 当前用户加入此项目的时间（仅 custom verb 查询时返回）
        maxMembers:
          type: integer
          format: int
          description: 项目最大成员数（0 表示不限制）
        memberCount:
          type: integer
          format: int
          description: 项目成员数量（只读）
        ownerId:
          type: string
          description: 项目所有者的用户 ID
        ownerName:
          type: string
          description: 项目所有者用户名（只读）
        role:
          type: string
          description: 当前用户在此项目的角色（仅 custom verb 查询时返回）
        roleBindingCount:
          type: integer
          format: int
          description: 角色绑定数量（只读）
        roleDisplayName:
          type: string
          description: 当前用户在此项目的角色显示名称（仅 custom verb 查询时返回）
        status:
          type: string
          description: 项目状态
          enum:
            - active
            - inactive
        visibility:
          type: string
          description: 项目可见性
          enum:
            - public
            - private
        workspaceId:
          type: string
          description: 所属租户 ID
        workspaceName:
          type: string
          description: 所属租户名称（只读）
      required:
        - workspaceId
        - ownerId
    OIDCDiscoveryResponse:
      type: object
      properties:
        authorization_endpoint:
          type: string
          description: 授权端点
        code_challenge_methods_supported:
          type: array
          description: 支持的 PKCE 挑战方法
          items:
            type: string
        grant_types_supported:
          type: array
          description: 支持的授权类型
          items:
            type: string
        id_token_signing_alg_values_supported:
          type: array
          description: 支持的 ID Token 签名算法
          items:
            type: string
        issuer:
          type: string
          description: 签发者标识
        jwks_uri:
          type: string
          description: JSON Web Key Set 地址
        response_types_supported:
          type: array
          description: 支持的响应类型
          items:
            type: string
        scopes_supported:
          type: array
          description: 支持的权限范围
          items:
            type: string
        subject_types_supported:
          type: array
          description: 支持的主体标识类型
          items:
            type: string
        token_endpoint:
          type: string
          description: 令牌端点
        userinfo_endpoint:
          type: string
          description: 用户信息端点
      required:
        - issuer
        - authorization_endpoint
        - token_endpoint
        - userinfo_endpoint
        - jwks_uri
    OIDCErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: 错误码
        error_description:
          type: string
          description: 错误描述
      required:
        - error
        - error_description
    OIDCLoginRequest:
      type: object
      properties:
        password:
          type: string
          description: 密码
        requestId:
          type: string
          description: 授权请求 ID，由 /oidc/authorize 重定向时传入。提供时完成 OIDC 授权流程，否则执行直接登录
        username:
          type: string
          description: 用户名或邮箱
      required:
        - username
        - password
    OIDCLoginResponse:
      type: object
      properties:
        redirectUri:
          type: string
          description: 授权回调重定向地址（授权流程模式）
        sessionId:
          type: string
          description: 会话 ID（直接登录模式）
        userId:
          type: string
          description: 用户 ID（直接登录模式）
    OIDCTokenRequest:
      type: object
      properties:
        client_id:
          type: string
          description: 客户端 ID
        client_secret:
          type: string
          description: 客户端密钥（机密客户端必填）
        code:
          type: string
          description: 授权码（grant_type=authorization_code 时必填）
        code_verifier:
          type: string
          description: PKCE 验证码（公开客户端必填）
        grant_type:
          type: string
          description: 授权类型：authorization_code 或 refresh_token
          enum:
            - authorization_code
            - refresh_token
        redirect_uri:
          type: string
          description: 重定向地址（grant_type=authorization_code 时需与授权请求一致）
        refresh_token:
          type: string
          description: 刷新令牌（grant_type=refresh_token 时必填）
        scope:
          type: string
          description: 请求的权限范围
      required:
        - grant_type
        - client_id
    OIDCTokenResponse:
      type: object
      properties:
        access_token:
          type: string
          description: 访问令牌
        expires_in:
          type: integer
          format: int64
          description: 访问令牌过期时间（秒）
        id_token:
          type: string
          description: ID 令牌
        refresh_token:
          type: string
          description: 刷新令牌
        scope:
          type: string
          description: 授权范围
        token_type:
          type: string
          description: 令牌类型，固定为 Bearer
      required:
        - access_token
        - token_type
        - expires_in
    OIDCUserInfoResponse:
      type: object
      properties:
        email:
          type: string
          description: 邮箱地址
        name:
          type: string
          description: 用户名称
        phone_number:
          type: string
          description: 手机号码
        sub:
          type: string
          description: 用户唯一标识
      required:
        - sub
    Overview:
      type: object
      properties:
        spec:
          $ref: '#/components/schemas/OverviewSpec'
    Permission:
      type: object
      properties:
        spec:
          $ref: '#/components/schemas/PermissionSpec'
    PermissionList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        totalCount:
          type: integer
          format: int64
    PermissionSpec:
      type: object
      properties:
        code:
          type: string
          description: 权限标识码，如 iam:users:list，首段为模块名
        description:
          type: string
          description: 权限描述
        method:
          type: string
          description: HTTP 方法
        path:
          type: string
          description: API 路径
        scope:
          type: string
          description: 权限作用域
          enum:
            - platform
            - workspace
            - namespace
      required:
        - code
        - method
        - path
        - scope
    Role:
      type: object
      properties:
        spec:
          $ref: '#/components/schemas/RoleSpec'
    RoleBinding:
      type: object
      properties:
        spec:
          $ref: '#/components/schemas/RoleBindingSpec'
    RoleBindingList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RoleBinding'
        totalCount:
          type: integer
          format: int64
    RoleBindingSpec:
      type: object
      properties:
        isOwner:
          type: boolean
          description: 是否为资源所有者
        namespaceId:
          type: string
          description: 项目 ID（namespace scope 时必填）
        namespaceName:
          type: string
          description: 项目名称（只读）
        roleDisplayName:
          type: string
          description: 角色显示名称（只读）
        roleId:
          type: string
          description: 角色 ID
        roleName:
          type: string
          description: 角色名称（只读）
        scope:
          type: string
          description: 绑定作用域
          enum:
            - platform
            - workspace
            - namespace
        userDisplayName:
          type: string
          description: 用户显示名称（只读）
        userId:
          type: string
          description: 用户 ID
        username:
          type: string
          description: 用户名（只读）
        workspaceId:
          type: string
          description: 租户 ID（workspace/namespace scope 时必填）
        workspaceName:
          type: string
          description: 租户名称（只读）
      required:
        - userId
        - roleId
        - scope
    RoleList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        totalCount:
          type: integer
          format: int64
    RoleSpec:
      type: object
      properties:
        builtin:
          type: boolean
          description: 是否为内置角色（只读）
        description:
          type: string
          description: 角色描述
        displayName:
          type: string
          description: 角色显示名称
        name:
          type: string
          description: 角色唯一名称，如 platform-admin
        ruleCount:
          type: integer
          format: int32
          description: 权限规则数量（仅列表返回）
        rules:
          type: array
          description: 权限规则列表，支持精确码和通配符模式（如 *:*、iam:*、iam:users:list）
          items:
            type: string
        scope:
          type: string
          description: 角色作用域
          enum:
            - platform
            - workspace
            - namespace
      required:
        - name
        - scope
    User:
      type: object
      properties:
        spec:
          $ref: '#/components/schemas/UserSpec'
    UserList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/User'
        totalCount:
          type: integer
          format: int64
    UserPermissions:
      type: object
      properties:
        spec:
          $ref: '#/components/schemas/UserPermissionsSpec'
    UserPermissionsSpec:
      type: object
      properties:
        isPlatformAdmin:
          type: boolean
          description: 是否为平台管理员
        namespaces:
          type: object
          description: 项目级权限（key 为 namespaceId）
        platform:
          type: array
          description: 平台级权限码列表
          items:
            type: string
        workspaces:
          type: object
          description: 租户级权限（key 为 workspaceId）
    UserSpec:
      type: object
      properties:
        avatarUrl:
          type: string
          format: uri
          description: 用户头像 URL
        displayName:
          type: string
          description: 用户显示名称
        email:
          type: string
          format: email
          description: 邮箱地址
        joinedAt:
          type: string
          description: 用户加入租户或项目的时间（仅成员列表查询时返回）
        namespaces:
          type: array
          description: 用户所属的项目列表（仅在列表查询时返回）
          items:
            type: string
        password:
          type: string
          format: password
          description: 用户密码（只写字段，创建时设置，响应中不返回）
        phone:
          type: string
          description: 手机号码
        role:
          type: string
          description: 用户在租户或项目中的角色（仅成员列表查询时返回）
        status:
          type: string
          description: 账户状态
          enum:
            - active
            - inactive
        username:
          type: string
          description: 用户名，3-50个字符，仅支持小写字母、数字和下划线
      required:
        - username
        - email
    Workspace:
      type: object
      properties:
        spec:
          $ref: '#/components/schemas/WorkspaceSpec'
    WorkspaceList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Workspace'
        totalCount:
          type: integer
          format: int64
    WorkspaceScopePerms:
      type: object
      properties:
        permissions:
          type: array
          description: 展开后的权限码列表
          items:
            type: string
        roleNames:
          type: array
          description: 角色名称列表
          items:
            type: string
    WorkspaceSpec:
      type: object
      properties:
        description:
          type: string
          description: 租户描述
        displayName:
          type: string
          description: 租户显示名称
        joinedAt:
          type: string
          description: 当前用户加入此租户的时间（仅 custom verb 查询时返回）
        memberCount:
          type: integer
          format: int
          description: 成员数量（只读）
        namespaceCount:
          type: integer
          format: int
          description: 项目数量（只读）
        ownerId:
          type: string
          description: 租户所有者的用户 ID
        ownerName:
          type: string
          description: 所有者用户名（只读）
        role:
          type: string
          description: 当前用户在此租户的角色（仅 custom verb 查询时返回）
        roleBindingCount:
          type: integer
          format: int
          description: 角色绑定数量（只读）
        roleDisplayName:
          type: string
          description: 当前用户在此租户的角色显示名称（仅 custom verb 查询时返回）
        status:
          type: string
          description: 租户状态
          enum:
            - active
            - inactive
      required:
        - ownerId
