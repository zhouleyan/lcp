# Development config overlay — used by `make dev`
# Frontend runs on :5173 (vite dev server), backend on :8428

database:
  host: "localhost"
  port: 5432
  user: "lcp"
  password: "lcp"
  dbName: "lcp"
  sslMode: "disable"
  maxConns: 10

logger:
  level: "INFO"
  format: "default"

oidc:
  issuer: "http://localhost:8428"
  algorithm: "EdDSA"
  accessTokenTTL: "1h"
  refreshTokenTTL: "168h"
  authCodeTTL: "5m"
  loginUrl: "/login"
  clients:
    - id: "lcp-ui"
      public: true
      redirectUris:
        - "http://localhost:5173/auth/callback"
      scopes: ["openid", "profile", "email", "phone"]
