services:
  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      TZ: ${TIME_ZONE}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 3s
      timeout: 3s
      retries: 10

  lcp-server:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    ports:
      - "8428:8428"
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      TIME_ZONE: ${TIME_ZONE}
    volumes:
      - ../../app/lcp-server/config.yaml:/etc/lcp/config.yaml:ro
    command: ["-loggerTimezone=${TIME_ZONE}"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
